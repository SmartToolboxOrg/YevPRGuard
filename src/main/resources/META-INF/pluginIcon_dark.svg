<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <!-- Glowing iris — light core fades to deep blue -->
    <radialGradient id="iris" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#C8EEFF"/>
      <stop offset="45%"  stop-color="#4AB8F5"/>
      <stop offset="100%" stop-color="#1A5E8A"/>
    </radialGradient>
  </defs>

  <!-- Antenna shaft -->
  <line x1="20" y1="7" x2="20" y2="11"
        stroke="#4DAEFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="20" cy="5.5" r="2.5" fill="#4DAEFF"/>
  <circle cx="19.3" cy="4.7" r="0.9" fill="#C8EEFF"/>

  <!-- Ear bolts — drawn first; head fill covers their inner half cleanly -->
  <rect x="2"  y="18.5" width="5" height="5" rx="2"
        fill="#090F1E" stroke="#4DAEFF" stroke-width="1.5"/>
  <rect x="33" y="18.5" width="5" height="5" rx="2"
        fill="#090F1E" stroke="#4DAEFF" stroke-width="1.5"/>

  <!-- Head — drawn after ears to mask their inner edges -->
  <rect x="5" y="11" width="30" height="21" rx="5"
        fill="#090F1E" stroke="#4DAEFF" stroke-width="2"/>

  <!-- Left eye -->
  <circle cx="14.5" cy="20.5" r="4"   fill="#06111E" stroke="#3A9BD5" stroke-width="1.5"/>
  <circle cx="14.5" cy="20.5" r="2.6" fill="url(#iris)"/>
  <circle cx="13.6" cy="19.6" r="0.85" fill="#FFFFFF" opacity="0.8"/>

  <!-- Right eye -->
  <circle cx="25.5" cy="20.5" r="4"   fill="#06111E" stroke="#3A9BD5" stroke-width="1.5"/>
  <circle cx="25.5" cy="20.5" r="2.6" fill="url(#iris)"/>
  <circle cx="24.6" cy="19.6" r="0.85" fill="#FFFFFF" opacity="0.8"/>

  <!-- Smile — endpoints align with eye centres for balance -->
  <path d="M14.5 26.5 Q20 30.5 25.5 26.5"
        fill="none" stroke="#4DAEFF" stroke-width="2" stroke-linecap="round"/>
</svg>
